<div class="container">

  <header>
    <h2>Buscador de <span>Música 𝄞</span></h2>
    <hr />
  </header>

  <div class="search-box">
    <input
      type="text"
      placeholder="Buscar artista o canción..."
      [(ngModel)]="searchTerm"
    />

    <button (click)="search()">Buscar</button>
  </div>

  <div class="results">
    <ng-container *ngIf="songs.length > 0; else noResults">
      <p class="total">Total canciones: {{ songs.length }}</p>

      <div
        class="song-card"
        *ngFor="let song of songs"
        (click)="openSong(song)"
      >
        <div class="cd">
          <img [src]="song.album.cover_medium" />
        </div>

        <h3>{{ song.title }}</h3>

        <p class="artist">{{ song.artist.name }}</p>
      </div>
    </ng-container>

    <ng-template #noResults>
      <p class="no-results">No se encontraron canciones</p>
    </ng-template>
  </div>

  <app-music-modal
    *ngIf="selectedSong"
    [song]="selectedSong"
    (closed)="closeModal()"
  ></app-music-modal>

</div>
