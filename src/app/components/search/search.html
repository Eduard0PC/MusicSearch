<div class="container">
  <header>
    <h2>Buscador de <span>Música 𝄞</span></h2>
    <hr />
  </header>

  <div class="search-box">
    <input type="text" placeholder="Buscar artista o canción..." [(ngModel)]="searchTerm" />

    <button (click)="search()">Buscar</button>
  </div>

  <div class="results">
    @if (songs.length > 0) {

      @for (song of songs | paginate: { itemsPerPage: 6, currentPage: p }; track song.id) {
        <div class="song-card" (click)="openSong(song)">
          <div class="cd">
            <img [src]="song.album.cover_medium" />
          </div>

          <h3>{{ song.title }}</h3>

          <p class="artist">{{ song.artist.name }}</p>
        </div>
      }
    } @else {
      <p class="no-results">No se encontraron canciones (aún)</p>
    }
  </div>

  @if (songs.length > 0) {
    <div class="pagination">
      <pagination-controls (pageChange)="p = $event"></pagination-controls>
    </div>
  }

  @if (selectedSong) {
    <app-music-modal [song]="selectedSong" (closed)="closeModal()"></app-music-modal>
  }
</div>
